name: ci

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material
          pip install "mkdocstrings[python]"
          pip install pillow cairosvg

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.39"

      - name: Prepare MkDocs source
        run: |
          rm -rf mkdocs_docs
          mkdir -p mkdocs_docs/content
          rsync -a --exclude ".DS_Store" tutorial/img/ mkdocs_docs/img/
          python - <<'PY'
          from pathlib import Path
          import re

          def convert(src: Path, dst: Path) -> None:
              text = src.read_text()
              image_path = None
              if text.startswith("---\n"):
                  _, frontmatter, body = text.split("---\n", 2)
                  for line in frontmatter.splitlines():
                      if line.strip().startswith("image_path:"):
                          image_path = line.split(":", 1)[1].strip().strip('"').strip("'")
                  text = f"---\n{frontmatter}---\n{body}"

              if image_path:
                  text = text.replace("{{< meta image_path >}}", image_path)

              # MkDocs + mkdocstrings treats ":::" blocks as Python API directives.
              # Strip Quarto callout container markers before building MkDocs.
              lines = []
              for line in text.splitlines():
                  if re.match(r"^:::\s*\{.*\}\s*$", line):
                      continue
                  if re.match(r"^:::\s*$", line):
                      continue
                  lines.append(line)
              dst.write_text("\n".join(lines) + "\n")

          convert(Path("tutorial/index.qmd"), Path("mkdocs_docs/index.md"))
          for src in sorted(Path("tutorial/content").glob("*.qmd")):
              convert(src, Path("mkdocs_docs/content") / f"{src.stem}.md")
          PY

      - name: Build MkDocs site
        run: mkdocs build

      - name: Build Quarto tutorial
        working-directory: tutorial
        run: quarto render

      - name: Add tutorial to MkDocs deployment
        run: |
          rm -rf site/tutorial
          mkdir -p site/tutorial
          rsync -a tutorial/_site/ site/tutorial/

      - name: Deploy combined site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
