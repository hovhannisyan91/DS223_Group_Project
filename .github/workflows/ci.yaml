name: ci

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material
          pip install "mkdocstrings[python]"
          pip install pillow cairosvg

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.39"

      - name: Prepare MkDocs source
        run: |
          rm -rf mkdocs_docs
          mkdir -p mkdocs_docs/content
          rsync -a --exclude ".DS_Store" tutorial/img/ mkdocs_docs/img/
          cp tutorial/index.qmd mkdocs_docs/index.md
          for file in tutorial/content/*.qmd; do
            cp "$file" "mkdocs_docs/content/$(basename "$file" .qmd).md"
          done

      - name: Build MkDocs site
        run: mkdocs build

      - name: Build Quarto tutorial
        working-directory: tutorial
        run: quarto render

      - name: Add tutorial to MkDocs deployment
        run: |
          rm -rf site/tutorial
          mkdir -p site/tutorial
          rsync -a tutorial/_site/ site/tutorial/

      - name: Deploy combined site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
